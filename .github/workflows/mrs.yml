name: mrs

on:
  workflow_dispatch:
  schedule:
    # 表达式生成 https://crontab.guru/
    - cron: "45 19 * * *" #北京时间上午3点45分
  push:
    paths:
      - ".github/workflows/mrs.yml"
      - "config.yaml"
      - "start.sh"
      - "scripts/**"

jobs:
  update:
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: write
    env:
      # 将 Token 传递给脚本，推送时需要用
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖
        env:
          YQ_VERSION: "v4.44.6"
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl jq wget gzip coreutils python3 ca-certificates
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: 运行脚本
        run: |
          export TZ='Asia/Shanghai'
          bash ./start.sh

      - uses: igorjs/gh-actions-clean-workflow@v6
        with:
          runs_older_than: 0
          runs_to_keep: 3 # 保留最近3次运行的工作流
